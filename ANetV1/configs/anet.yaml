data:
  root: /Users/avneh/Code/UAVImaging2627/datasets/suas-synth-50k
  coverage_thresh: 0.3
  # VisDrone person boxes dominate mannequin counts (dataset README) —
  # downweight vd_* images in the sampler
  vd_weight: 0.4
  mannequin_weight: 4.0
  tent_weight: 2.0

train:
  epochs: 30
  batch_size: 4
  accum_steps: 4
  # memory: activations dominate (~2GB/image under autograd; params are irrelevant)
  # — checkpointing is the valve (8.7GB vs 10.9GB peak); mps_memory_frac hard-caps
  # the MPS allocator so a bad config errors out instead of swap-freezing the Mac
  use_checkpoint: true
  mps_memory_frac: 0.5
  # sampler draws with replacement, so an "epoch" is only an eval/checkpoint
  # cadence; 6000 samples ≈ 40min/epoch on M4 MPS (full 19,185 was ~93min blind)
  samples_per_epoch: 6000
  lr: 3.0e-3
  focal_gamma: 2.0
  class_alpha: [1.0, 8.0, 4.0]   # [background, mannequin, tent]
  l2_score_reg: 1.0e-4           # cosine-frequency bound (D24)
  l1_kernel_reg: 1.0e-4          # sparse pyramid kernels (D24)
  num_workers: 2               # loading is 20x faster than MPS compute; extra workers just hold RAM
  checkpoint_dir: runs/anet

distill:
  teacher_cache: runs/teacher_cache
  kl_weight: 0.7
  temperature: 2.0
  checkpoint_dir: runs/anet_distill

yolo:
  weights: yolo26n.pt            # falls back to yolo11n.pt if unavailable
  imgsz: 640
  epochs: 60
  batch: 16
  workers: 0                     # dataloader workers leak RAM on MPS (ultralytics #22791)
  amp: false                     # MPS autocast flaky; rule out as leak/loss contributor
  project: runs/yolo
