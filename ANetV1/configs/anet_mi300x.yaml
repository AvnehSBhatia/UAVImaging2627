# ANetV1 training config for AMD MI300X (ROCm; presents as torch device "cuda").
# 192GB HBM3 + CDNA3: no activation-memory pressure, so no checkpointing, full
# epochs, bf16 autocast (fp32 dynamic range — the fp16 NaN seen on MPS can't recur).
# $DATA_ROOT is expanded by anet.config.load_config; export it before running.

data:
  root: $DATA_ROOT
  coverage_thresh: 0.3
  # VisDrone person boxes dominate mannequin counts (dataset README) —
  # downweight vd_* images in the sampler
  vd_weight: 0.4
  mannequin_weight: 4.0
  tent_weight: 2.0

train:
  epochs: 30
  # batch 64: activations ~1.2-1.5GB/img under bf16 autograd -> ~80-95GB of 192GB
  # (comfortable headroom for MIOpen workspaces). 300 steps/epoch, 9k steps total.
  batch_size: 64
  accum_steps: 1
  use_checkpoint: false          # recompute is pure waste with 192GB HBM
  amp: bf16
  samples_per_epoch: null        # full 19,185-image pass per epoch
  early_stop_patience: 6         # stop when synthetic mannequin recall stalls 6 epochs
  early_stop_min_epochs: 10      # small-object recall emerges late; don't kill early runs
  # lr: sqrt-scaled would be 6e-3 (3e-3 @ eff.16 x sqrt(4)), but the first 6e-3
  # run NaN'd right after warmup and the 3e-3 baseline was never validated —
  # 4e-3 until one full run survives; raise toward 6e-3 after that if loss is smooth.
  lr: 4.0e-3
  warmup_steps: 300              # 1 epoch linear ramp — large batch + init-sensitive gates
  grad_clip: 1.0                 # oscillatory cosine gates: clip spikes instead of diverging
  focal_gamma: 2.0
  class_alpha: [1.0, 8.0, 4.0]   # [background, mannequin, tent]
  l2_score_reg: 1.0e-4           # cosine-frequency bound (D24)
  l1_kernel_reg: 1.0e-4          # sparse pyramid kernels (D24)
  num_workers: 16                # ~50ms/img JPEG decode; 16 workers ≈ 320 img/s feed
  checkpoint_dir: runs/anet

distill:
  teacher_cache: runs/teacher_cache
  kl_weight: 0.7
  temperature: 2.0
  checkpoint_dir: runs/anet_distill

yolo:
  weights: yolo26n.pt            # falls back to yolo11n.pt if unavailable
  imgsz: 960                     # spec comparison point (ARCHITECTURE §10); 640 was an MPS concession
  epochs: 60
  patience: 10                   # ultralytics native early stop on fitness
  # 64 == ultralytics nominal batch (nbs): loss/weight-decay scaling is exactly
  # its calibrated default, no hidden rescale. If GPU reserved mem keeps climbing
  # toward the 196GB VF ceiling, drop to 48/32 (ultralytics auto-accumulates to nbs
  # so the effective optimizer step is unchanged) — that halves activation memory.
  batch: 64
  # 8, not 16: DataLoader prefetches prefetch_factor(2) x workers batches, so 16
  # workers x 2 x 64 imgs at 960px pinned ~= tens of GB of *host* RAM. 8 workers
  # keeps the MI300X fed (JPEG decode >> nano-model step time) at half the RAM.
  workers: 8
  amp: true                      # CUDA amp is the well-trodden ultralytics path
  project: runs/yolo
